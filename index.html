<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>C# Краткий учебник</title>
    <link rel="icon" type="image/svg+xml" href="images/icon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="lib/github-dark.min.css">
    <script src="lib/highlight.min.js"></script>
</head>
<body>
    <div class="layout">
        <div class="sidebar" id="sidebar">
            <a href="index.html" style="text-decoration: none; color:white;"><h2>C# Краткий учебник</h2></a>
            <button id="toggleMenu" class="mobileMenuBtn">☰</button>
            <input id="search" placeholder="Поиск темы">
            <div id="currentTopicTitle" style="display: none;"></div>
            <div id="backToTopics" style="display: none; margin-bottom: 10px;">
                <button id="backButton">← Все темы</button>
            </div>
            <ul id="menu"></ul>
            
            <div class="sidebar-footer">
                <p>Разработано VLPLAY Games</p>
                <p>Версия 0.9</p>
            </div>
        </div>

        <div class="content">
            <!-- Хлебные крошки -->
            <div id="breadcrumbs" class="breadcrumbs"></div>

            <div id="mainScreen" class="fadeIn">
                <h1>Добро пожаловать!</h1>
                <p>Выберите тему слева или проверьте свои знания в тесте.</p>
                <button id="goToQuizBtn" class="quiz-start-btn">Пройти тест</button>
            </div>

            <div id="quizScreen" class="hidden fadeIn">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <h2>Тест по C#</h2>
                    <button id="toggleQuizSettingsBtn" class="settings-btn" title="Настройки теста">⚙️</button>
                </div>
                
                <div id="quizSettingsPanel">
                    <div id="quizModeSelector" class="quiz-mode-selector">
                        <label>
                            <input type="radio" name="quizMode" value="radio" checked> Обычный (выбор варианта)
                        </label>
                        <label>
                            <input type="radio" name="quizMode" value="match"> Блочный (соедини вопрос-ответ)
                        </label>
                    </div>

                    <div id="quizTopicSelector">
                        <p>Выберите темы для теста:</p>
                        <div id="quizTopicsList" class="quiz-topics-list"></div>
                        <div class="quiz-topic-buttons">
                            <button id="quizSelectAllBtn">Выбрать все</button>
                            <button id="quizDeselectAllBtn">Сбросить все</button>
                        </div>
                        <button id="quizStartBtn" class="quiz-start-btn">Начать тест</button>
                    </div>
                </div>

                <div id="quizTestArea" class="hidden">
                    <div id="quizContainer" class="quiz-container"></div>

                    <div id="matchContainer" class="match-container hidden">
                        <div class="match-columns">
                            <div class="match-left" id="matchQuestions"></div>
                            <div class="match-right" id="matchAnswers"></div>
                        </div>
                        <canvas id="matchCanvas"></canvas>
                    </div>

                    <div id="quizControls" class="quiz-controls" style="display: none;">
                        <button id="quizCheckBtn">Проверить ответы</button>
                        <button id="quizResetBtn">Сбросить</button>
                    </div>
                </div>
            </div>

            <h1 id="title" class="hidden fadeIn">Выберите тему</h1>

            <div class="section" id="theorySection">
                <h2>Теория</h2>
                <div id="theory" class="fadeIn"></div>
            </div>

            <div id="info" class="fadeIn"></div>

            <div class="section" id="examplesSection">
                <h2>Примеры</h2>
                <div id="examples" class="fadeIn"></div>
            </div>

            <div class="section" id="screensSection">
                <h2>Скриншоты</h2>
                <div id="screens" class="fadeIn"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="quiz.js"></script>
</body>
</html>
