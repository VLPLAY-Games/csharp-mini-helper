<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>C# Краткий учебник</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="layout">
        <div class="sidebar" id="sidebar">
            <h2>C# Краткий учебник</h2>
            <button id="toggleMenu" class="mobileMenuBtn">☰</button>
            <input id="search" placeholder="Поиск темы">
            <ul id="menu"></ul>
        </div>

        <div class="content">
            <div id="mainScreen" class="fadeIn">
                <h1>Добро пожаловать!</h1>
                <p>Выберите тему слева.</p>
            </div>

            <h1 id="title" class="hidden fadeIn">Выберите тему</h1>

            <div class="section">
                <h2>Теория</h2>
                <div id="theory" class="fadeIn"></div>
            </div>

            <div id="info" class="fadeIn"></div>

            <div class="section">
                <h2>Примеры</h2>
                <div id="examples" class="fadeIn"></div>
            </div>

            <h2>Скриншоты</h2>
            <div id="screens" class="fadeIn"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
